version: "3.8"

services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_LOG_LEVEL=INFO
      - GATEWAY_CONFIG_PATH=/app/config/gateway.yaml
      - GATEWAY_PROVIDERS_CONFIG_PATH=/app/config/providers.yaml
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - gateway-network

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
      args:
        VITE_API_URL: http://gateway:8000
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://gateway:8000
    restart: unless-stopped
    networks:
      - gateway-network
    depends_on:
      - gateway

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - gateway-network

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - gateway-network
    depends_on:
      - prometheus

networks:
  gateway-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
