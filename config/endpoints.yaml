# LLM Gateway Endpoints Configuration
# Your actual GPU nodes running Ollama

endpoints:
  # Primary GPU node (10.0.0.19)
  - name: gpu-node
    type: ollama
    url: http://10.0.0.19:11434
    enabled: true
    timeout: 120.0  # 2 min for large models
    max_retries: 3
    labels:
      tier: primary
      location: local

  # GPU node with 3060 (10.0.0.14)
  - name: gpu-node-3060
    type: ollama
    url: http://10.0.0.14:11434
    enabled: true
    timeout: 120.0
    max_retries: 3
    labels:
      tier: primary
      gpu: "3060"
      location: local

# Environments control which endpoints and models are available
environments:
  - name: dev
    # In dev, allow all discovered models from all endpoints
    allow_all_discovered: true

  - name: prod
    # In prod, only approved models
    approved_models:
      - phi4:14b
      - llama3.2:*
      - qwen2.5:*

# Resolution configuration for model→endpoint mapping
resolution:
  # When multiple endpoints have a model, prefer this order
  endpoint_priority:
    - gpu-node        # Try gpu-node first
    - gpu-node-3060   # Then fall back to 3060

  # When model is on multiple endpoints, just pick first by priority
  ambiguous_behavior: first_priority
