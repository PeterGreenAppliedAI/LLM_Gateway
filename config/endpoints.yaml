# DevMesh Gateway Endpoints Configuration
#
# This file demonstrates the new endpoints/environments architecture.
# For backward compatibility, the gateway also supports the legacy
# providers.yaml format.

# Endpoints represent physical inference runtimes
endpoints:
  - name: gpunode-ollama
    type: ollama
    url: http://192.168.1.216:11434
    enabled: true
    timeout: 60.0
    max_retries: 3
    labels:
      cold_flexible: "true"
      prod_eligible: "true"
      datacenter: main

  - name: dgxspark-ollama
    type: ollama
    url: http://dgxspark1:11434
    enabled: true
    timeout: 60.0
    max_retries: 3
    labels:
      cold_flexible: "true"
      # NOT prod_eligible - experimental endpoint
      datacenter: spark

  - name: local-vllm
    type: vllm
    url: http://localhost:8001
    enabled: false
    timeout: 120.0
    max_retries: 2
    labels:
      prod_eligible: "false"
      datacenter: local

# Environments control which endpoints and models are available
environments:
  - name: dev
    # In dev, allow all discovered models from all endpoints
    allow_all_discovered: true

  - name: prod
    # In prod, only use endpoints with prod_eligible label
    endpoint_filter:
      prod_eligible: "true"
    # And only allow approved models
    approved_models:
      - phi4:14b
      - devstral:24b
      - qwen2.5:72b

  - name: staging
    # Staging uses specific endpoints
    allowed_endpoints:
      - gpunode-ollama
      - dgxspark-ollama
    # Allow all models on those endpoints
    allow_all_discovered: true

# Resolution configuration for model→endpoint mapping
resolution:
  # Per-model defaults: which endpoint to use for specific models
  model_defaults:
    - model: "phi4:14b"
      endpoint: gpunode-ollama
    - model: "nemotron*"  # Glob pattern for all nemotron variants
      endpoint: dgxspark-ollama
    - model: "devstral:*"
      endpoint: gpunode-ollama

  # When multiple endpoints have a model, prefer this order
  endpoint_priority:
    - gpunode-ollama
    - dgxspark-ollama
    - local-vllm

  # What to do when model is on multiple endpoints with no default
  # "error" - fail with AmbiguousModelError (default, safer)
  # "first_priority" - use first from endpoint_priority
  ambiguous_behavior: error
