# DevMesh Gateway Configuration

# Rate limiting settings
rate_limits:
  requests_per_minute_global: 1000
  requests_per_minute_per_user: 100
  max_tokens_per_request: 4096

# Routing configuration
routing:
  default_provider: ollama
  rules:
    - task: chat
      provider: ollama
      fallback_providers: [vllm]
    - task: summarize
      provider: ollama
      fallback_providers: []
    - task: long_context_chat
      provider: vllm
      fallback_providers: [ollama]

# Providers are loaded from providers.yaml
