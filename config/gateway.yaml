# DevMesh Gateway Configuration

# Rate limiting settings
rate_limits:
  requests_per_minute_global: 1000
  requests_per_minute_per_user: 100
  max_tokens_per_request: 4096

# =============================================================================
# Endpoints Configuration
# Your actual GPU nodes running Ollama
# =============================================================================

endpoints:
  # Primary GPU node (10.0.0.19)
  - name: gpu-node
    type: ollama
    url: http://10.0.0.19:11434
    enabled: true
    timeout: 120.0  # 2 min for large models
    max_retries: 3
    labels:
      tier: primary
      location: local

  # GPU node with 3060 (10.0.0.14)
  - name: gpu-node-3060
    type: ollama
    url: http://10.0.0.14:11434
    enabled: true
    timeout: 120.0
    max_retries: 3
    labels:
      tier: primary
      gpu: "3060"
      location: local

  # DGX Spark 1 (10.0.0.15) - Large models
  - name: dgx-spark-1
    type: ollama
    url: http://10.0.0.15:11434
    enabled: true
    timeout: 300.0  # 5 min for 72b/120b models
    max_retries: 3
    labels:
      tier: primary
      hardware: dgx-spark
      location: local

# =============================================================================
# Environments
# Control which endpoints and models are available
# =============================================================================

environments:
  - name: dev
    # In dev, allow all discovered models from all endpoints
    allow_all_discovered: true

  - name: prod
    # In prod, only approved models
    approved_models:
      - phi4:14b
      - llama3.2:*
      - qwen2.5:*

# =============================================================================
# Resolution Policy
# Model -> Endpoint mapping
# =============================================================================

resolution:
  # When multiple endpoints have a model, prefer this order
  endpoint_priority:
    - gpu-node        # Try gpu-node first (lighter workloads)
    - gpu-node-3060   # Then 3060
    - dgx-spark-1     # DGX for heavy models

  # When model is on multiple endpoints, just pick first by priority
  ambiguous_behavior: first_priority

# =============================================================================
# Authentication
# API keys with per-client routing
# =============================================================================

auth:
  enabled: true
  api_keys:
    # Electrical Estimator - always routes to gpu-node-3060
    - key: "est-electrical-estimator-key-2024"
      client_id: electrical-estimator
      description: "Electrical estimation application"
      target_endpoint: gpu-node-3060

    # Discord bot - uses default resolution
    - key: "discord-bot-api-key-2024"
      client_id: discord-bot
      description: "Discord bot integration"

    # Default dev key - no restrictions
    - key: "dev-default-key-12345678"
      client_id: dev-user
      description: "Development testing"
